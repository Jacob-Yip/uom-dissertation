[NEAT]
# Use the highest fitness in the population as the criterion
fitness_criterion     = max

# Stop evolution when a genome reaches this fitness
# NOTE: You have to determine the maximum value of fitness yourself (problem-specific)
# TODO: Confirm
fitness_threshold     = 50

# Number of genomes in each generation
# 150 is good for smaller problems
# In our project, this does not matter because it will be overwritten later anyway
# NOTE: This must not be too small or the evolution algorithm will fail
# Need to make sure pop_size >= min_species_size * species_num
# If pop_size is too small, it might not be big enough to hold all species -> you see the error "RuntimeError: Configuration conflict: population size <pop_size> is less than num_species * min_species_size n. Cannot satisfy per-species minima. "
# You might ask what the smallest possible pop_size then? 
# There is no smallest possible pop_size -> there is a chance that even a very big pop_size might not be enough to hold all the species
# It's just when pop_size is larger, it is much less likely to encounter the case where there are too many species for this population
# For that to happen, i.e. error occurs even if pop_size is very large, there must be many species, i.e. compatibility_threshold is very small (so you should update this value instead)
pop_size              = 150

# Don't restart from scratch if all species go extinct
# (Rarely happens with proper configuration)
reset_on_extinction   = False

# Stop only when fitness_threshold is reached (not after fixed generations)
# This makes fitness_threshold useless
# Instead, it always runs for n generations, where n is set by my code
no_fitness_termination = True

[NEATNCLGenome]
# Number of input features
num_inputs              = 13

# Number of output features
num_outputs             = 1

# Start with no hidden neurons (networks evolve complexity as needed)
num_hidden              = 0

# No recurrent connections (feed-forward only)
# Set to False if you need memory/temporal processing
feed_forward            = True

# Start with all inputs connected to all outputs
# Common options:
#   unconnected        - no initial connections
#   full_direct        - all inputs connected to all outputs (and hidden nodes, if any)
#   partial_direct <connection_fraction>   - random subset of full_direct connections (0.0-1.0)
# Legacy values ```full``` and ```partial``` are accepted for backward compatibility but are deprecated; prefer the explicit variants above
initial_connection      = unconnected

# Note: The original NEAT paper emphasizes starting from minimal structure (no hidden nodes
# and sparse connectivity) and then complexifying over time. NEAT-Python follows this
# philosophy by treating ```unconnected``` as the canonical "no edges" option (see
# :ref:`initial-connection-config-label` and :doc:`neat_overview`). In simple examples like XOR
# we use ```full_direct``` for convenience so networks make progress quickly, while still
# starting with zero hidden nodes. If you want the sparsest possible starting networks,
# set ```initial_connection = unconnected``` instead.

# Activation function for neurons
# sigmoid: outputs in range (0, 1) - good for most problems
# tanh: outputs in range (-1, 1)
# relu: outputs in range [0, +infinity)
# Don't know why but "activation" is the only available value
activation_default      = relu

# Probability of changing a neuron's activation function
# 0.0 = never change (recommended to start)
activation_mutate_rate  = 0.0

# Available activation functions for mutation
# If mutate_rate > 0, neurons can change to these functions
activation_options      = relu

# How to combine multiple inputs to a neuron
# sum: add all inputs (standard for neural networks)
aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

# Neuron bias (like intercept in y = mx + b)
# Controls the neuron's firing threshold
# Average starting bias
bias_init_mean          = 0.0
# Variation in starting bias
bias_init_stdev         = 1.0
# Random distribution to use
bias_init_type          = gaussian
# Maximum allowed bias
bias_max_value          = 30.0
# Minimum allowed bias
bias_min_value          = -30.0
# How much to change when mutating
bias_mutate_power       = 0.5
# Probability of mutating bias
bias_mutate_rate        = 0.7
# Probability of completely replacing bias
bias_replace_rate       = 0.1

# How to measure genetic distance between genomes
# Used for grouping into species
# Weight for non-matching genes
compatibility_disjoint_coefficient = 1.0
# Weight for weight differences
compatibility_weight_coefficient   = 0.5

# Structural mutation probabilities (per genome, per generation)
# Add a new connection
conn_add_prob           = 0.5
# Remove a connection
conn_delete_prob        = 0.5
# Add a new hidden neuron
node_add_prob           = 0.2
# Remove a hidden neuron
node_delete_prob        = 0.2

# Connection enable/disable options
# New connections start enabled
enabled_default         = True
# Probability of toggling enabled state
enabled_mutate_rate     = 0.01
# Extra probability to enable
enabled_rate_to_true_add  = 0.0
# Extra probability to disable
enabled_rate_to_false_add = 0.0

# Node response options
# The output of the node is determined by activation(bias + (response * aggregation(inputs)))
response_init_mean      = 1.0
response_init_stdev     = 0.0
response_init_type      = gaussian
response_max_value      = 1.0
response_min_value      = 1.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0

# Connection weight options (like neural network weights)
# Average starting weight
weight_init_mean        = 0.0
# Variation in starting weight
weight_init_stdev       = 1.0
# Random distribution
weight_init_type        = gaussian
# Maximum weight magnitude
weight_max_value        = 30
# Minimum weight magnitude
weight_min_value        = -30
# How much to change when mutating
weight_mutate_power     = 0.5
# Probability of mutating weight
weight_mutate_rate      = 0.8
# Probability of completely replacing weight
weight_replace_rate     = 0.1

# Structural mutation control
# Allow multiple structural changes per genome
single_structural_mutation = False
# Fallback behavior
structural_mutation_surer  = default

[DefaultSpeciesSet]
# How genetically similar genomes must be to belong to same species
# Lower = more species (more diversity, slower convergence)
# Higher = fewer species (less diversity, faster convergence)
# 3.0 is a good starting point
# TODO: Confirm
compatibility_threshold = 3.0

[DefaultStagnation]
# How to rank species for stagnation removal
# Use best genome in species
species_fitness_func = max

# Remove species that don't improve for this many generations
# TODO: Confirm
max_stagnation       = 20

# Protect the best N species from stagnation removal
# TODO: Confirm
species_elitism      = 2

# TODO: For some reason, this cannot be NEATNCLReproduction
[DefaultReproduction]
# Always keep the best N genomes unchanged
# TODO: Confirm
elitism            = 2

# Only the top X% of each species can reproduce
# 0.2 = top 20%
# TODO: Confirm
survival_threshold = 0.2

# Minimum members for a species to be maintained
min_species_size   = 2